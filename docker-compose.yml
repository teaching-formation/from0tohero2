services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./frontend/.env.local
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./admin:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./admin/.env.local
    environment:
      - NODE_ENV=development
    restart: unless-stopped

networks:
  default:
    name: from0tohero-network
